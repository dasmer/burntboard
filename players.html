<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Players — Burntboard</title>
  <meta name="description" content="Every player on the Burnt office ping pong roster.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://burntboard.com/players.html">
  <meta property="og:site_name" content="Burntboard">
  <meta property="og:title" content="Players — Burntboard">
  <meta property="og:description" content="Every player on the Burnt office ping pong roster.">
  <meta property="og:image" content="https://burntboard.com/images/burnttable.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Players — Burntboard">
  <meta name="twitter:description" content="Every player on the Burnt office ping pong roster.">
  <meta name="twitter:image" content="https://burntboard.com/images/burnttable.jpg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      padding-bottom: 80px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid transparent;
      border-radius: var(--radius-lg);
      padding: 24px 18px 20px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 0.18s ease, border-top-color 0.18s ease, box-shadow 0.18s ease;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .player-card:hover {
      transform: translateY(-4px);
      border-top-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .player-card.rank-1 { border-top-color: var(--gold); }
    .player-card.rank-2 { border-top-color: var(--silver); }
    .player-card.rank-3 { border-top-color: var(--bronze); }

    .player-card-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-strong);
    }

    .player-card.rank-1 .player-card-avatar { border-color: var(--gold); }
    .player-card.rank-2 .player-card-avatar { border-color: var(--silver); }
    .player-card.rank-3 .player-card-avatar { border-color: var(--bronze); }

    .player-card-name {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.3;
    }

    .player-card-username {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .player-card-stats {
      display: flex;
      gap: 14px;
      margin-top: 4px;
    }

    .player-card-stat {
      text-align: center;
    }

    .player-card-stat-value {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      line-height: 1;
      color: var(--text);
    }

    .player-card-stat-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .player-card-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .player-card.rank-1 .player-card-rank { color: var(--gold); }
    .player-card.rank-2 .player-card-rank { color: var(--silver); }
    .player-card.rank-3 .player-card-rank { color: var(--bronze); }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner container">
      <a href="index.html" class="nav-logo">BURNT<span>BOARD</span></a>
      <div class="nav-links">
        <a href="players.html" class="nav-link active">Players</a>
        <a href="leaderboard.html" class="nav-link">Leaderboard</a>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">PLAYERS</h1>
        <p class="page-subtitle" id="player-count">Loading roster…</p>
      </div>

      <div id="players-grid">
        <div class="loading-state">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <p class="loading-text">Pulling up the roster…</p>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-brand">BURNT<span>BOARD</span></span>
        <span class="footer-copy">Made with 🏓 at <a href="https://getburnt.ai/" target="_blank" rel="noopener">Burnt</a></span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    async function init() {
      const { players, games } = await loadData();

      // Sort by all-time wins (same ranking as leaderboard default)
      const ranked = computeLeaderboard(players, games, 'all-time', 'wins');

      document.getElementById('player-count').textContent =
        `${ranked.length} player${ranked.length !== 1 ? 's' : ''} on the roster`;

      const grid = document.getElementById('players-grid');
      grid.innerHTML = `<div class="players-grid">${
        ranked.map((p, i) => {
          const rank    = i + 1;
          const rankCls = rank <= 3 ? `rank-${rank}` : '';
          const rankTxt = rank === 1 ? '🥇 #1 ALL-TIME'
                        : rank === 2 ? '🥈 #2 ALL-TIME'
                        : rank === 3 ? '🥉 #3 ALL-TIME'
                        : `#${rank} ALL-TIME`;
          const delay   = Math.min(i * 40, 600);
          const wPct    = winRate(p.wins, p.gamesPlayed);

          return `
            <a
              href="profile.html?username=${p.username}"
              class="player-card ${rankCls}"
              style="animation-delay:${delay}ms"
            >
              <img
                src="${p.image}"
                alt="${p.name}"
                class="player-card-avatar"
                onerror="this.onerror=null;this.src=avatarFallback('${p.name}')"
              >
              <div class="player-card-name">${p.name}</div>
              <div class="player-card-username">@${p.username}</div>
              <div class="player-card-stats">
                <div class="player-card-stat">
                  <span class="player-card-stat-value">${p.wins}</span>
                  <span class="player-card-stat-label">Wins</span>
                </div>
                <div class="player-card-stat">
                  <span class="player-card-stat-value">${p.losses}</span>
                  <span class="player-card-stat-label">Loss</span>
                </div>
                <div class="player-card-stat">
                  <span class="player-card-stat-value">${wPct}</span>
                  <span class="player-card-stat-label">Win %</span>
                </div>
              </div>
              <div class="player-card-rank">${rankTxt}</div>
            </a>`;
        }).join('')
      }</div>`;
    }

    init();
  </script>
</body>
</html>
